<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Start Harvest Cycle - Royyala Diary</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>
    <div class="container">
        <span class="navbar-brand text-white fw-bold">Royyala Diary</span>
        <a th:href="@{/ponds}"
           class="btn btn-outline-light btn-sm">Back to My Ponds</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">

                    <h5 class="mb-4" style="color:#0F6E56">
                        Start New Harvest Cycle
                    </h5>

                    <form th:action="@{/cycles/start/{id}(id=${pondId})}"
                          th:object="${cycle}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">Start Date</label>
                            <input type="date"
                                   th:field="*{startDate}"
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Seed Count</label>
                            <input type="number"
                                   th:field="*{seedCount}"
                                   class="form-control"
                                   placeholder="e.g. 500000" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Seed Cost (in Rupees)
                            </label>
                            <input type="number"
                                   th:field="*{seedCost}"
                                   class="form-control"
                                   placeholder="e.g. 5000"
                                   step="0.01" required>
                        </div>

                        <button type="submit"
                                class="btn w-100"
                                style="background-color:#0F6E56; color:white;">
                            Start Cycle
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
