<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Royyala Diary - Register</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body p-4">

                    <h3 class="text-center mb-1" style="color:#0F6E56">
                        Royyala Diary
                    </h3>
                    <p class="text-center text-muted mb-4">
                        Create your farmer account
                    </p>

                    <div th:if="${error}" class="alert alert-danger" 
                         th:text="${error}">
                    </div>

                    <form th:action="@{/register}" 
                          th:object="${farmer}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{fullName}" 
                                   class="form-control" 
                                   placeholder="Enter your full name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" 
                                   class="form-control" 
                                   placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{password}" 
                                   class="form-control" 
                                   placeholder="Create a password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" th:field="*{phone}" 
                                   class="form-control" 
                                   placeholder="Enter your phone number">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Village</label>
                            <input type="text" th:field="*{village}" 
                                   class="form-control" 
                                   placeholder="Enter your village name">
                        </div>

                        <button type="submit" 
                                class="btn w-100"
                                style="background-color:#0F6E56; color:white;">
                            Register
                        </button>

                    </form>

                    <p class="text-center mt-3">
                        Already registered? 
                        <a th:href="@{/login}" style="color:#0F6E56">
                            Login here
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
