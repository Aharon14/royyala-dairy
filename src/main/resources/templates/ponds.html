<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <title>My Ponds - Royyala Diary</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .pond-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s;
        }
        .pond-card:hover { transform: translateY(-4px); }
        .page-header {
            background: linear-gradient(
                135deg, #0F6E56 0%, #1a9e7a 100%);
            color: white;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div th:if="${success}"
         class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert"></button>
    </div>

    <div class="page-header d-flex
                justify-content-between align-items-center">
        <div>
            <h5 class="mb-1 fw-bold">My Ponds</h5>
            <p class="mb-0 opacity-75 small">
                Manage all your shrimp ponds here
            </p>
        </div>
        <a th:href="@{/ponds/add}"
           class="btn btn-light fw-bold"
           style="color:#0F6E56;">
            + Add New Pond
        </a>
    </div>

    <div th:if="${#lists.isEmpty(ponds)}"
         class="text-center py-5">
        <div class="display-1 mb-3">🏊</div>
        <h5 class="text-muted">No ponds added yet</h5>
        <p class="text-muted">
            Add your first pond to get started
        </p>
        <a th:href="@{/ponds/add}"
           class="btn"
           style="background-color:#0F6E56; color:white;">
            + Add First Pond
        </a>
    </div>

    <div class="row g-3">
        <div class="col-md-4 col-sm-6"
             th:each="pond : ${ponds}">
            <div class="card pond-card shadow-sm h-100">

                <div class="card-body p-3">
                    <div class="d-flex align-items-center
                                mb-2 gap-2">
                        <span class="fs-3">🦐 </span>
                        <h6 class="fw-bold mb-0"
                            th:text="${pond.pondName}">
                        </h6>
                    </div>

                    <div class="text-muted small mb-1">
                        <span>📍</span>
                        <span th:text="${pond.location}">
                            Location
                        </span>
                    </div>

                    <div class="text-muted small mb-3">
                        <span>📐</span>
                        <span th:text="${pond.areaInAcres}
                              + ' acres'">
                            Area
                        </span>
                    </div>

                    <a th:href="@{/cycles/pond/{pondId}
                               (pondId=${pond.id})}"
                       class="btn btn-sm w-100"
                       style="background-color:#0F6E56;
                              color:white;">
                        View Cycles
                    </a>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
