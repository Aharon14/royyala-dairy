<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log Feed Entry - Royyala Diary</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>
    <div class="container">
        <span class="navbar-brand text-white fw-bold">
            Royyala Diary
        </span>
        <a th:href="@{/feed/cycle/{id}(id=${cycleId})}"
           class="btn btn-outline-light btn-sm">
            Back to Cycle
        </a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">

                    <h5 class="mb-4" style="color:#0F6E56">
                        Log Weekly Feed Entry
                    </h5>

                    <form th:action="@{/feed/add/{id}(id=${cycleId})}"
                          th:object="${feedEntry}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                Week Number
                            </label>
                            <input type="number"
                                   th:field="*{weekNumber}"
                                   class="form-control"
                                   placeholder="e.g. 1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Feed Date
                            </label>
                            <input type="date"
                                   th:field="*{feedDate}"
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Feed Quantity (kg)
                            </label>
                            <input type="number"
                                   th:field="*{feedQuantityKg}"
                                   class="form-control"
                                   placeholder="e.g. 50"
                                   step="0.1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Feed Cost (₹)
                            </label>
                            <input type="number"
                                   th:field="*{feedCost}"
                                   class="form-control"
                                   placeholder="e.g. 2000"
                                   step="0.01" required>
                        </div>

                        <button type="submit"
                                class="btn w-100"
                                style="background-color:#0F6E56;
                                       color:white;">
                            Save Feed Entry
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
