<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Pond - Royyala Diary</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">

                    <h5 class="mb-4" style="color:#0F6E56">Add New Pond</h5>

                    <form th:action="@{/ponds/add}"
                          th:object="${pond}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">Pond Name</label>
                            <input type="text"
                                   th:field="*{pondName}"
                                   class="form-control"
                                   placeholder="e.g. North Pond" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Area (in Acres)</label>
                            <input type="number"
                                   th:field="*{areaInAcres}"
                                   class="form-control"
                                   placeholder="e.g. 2.5"
                                   step="0.1">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text"
                                   th:field="*{location}"
                                   class="form-control"
                                   placeholder="e.g. Kakinada">
                        </div>

                        <button type="submit"
                                class="btn w-100"
                                style="background-color:#0F6E56; color:white;">
                            Add Pond
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
