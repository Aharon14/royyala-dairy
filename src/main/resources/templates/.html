<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Harvest Cycles - Royyala Diary</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar" style="background-color:#0F6E56">
    <div class="container">
        <a class="navbar-brand text-white fw-bold">Royyala Diary</a>
        <div class="d-flex gap-2">
            <a th:href="@{/ponds}"
               class="btn btn-outline-light btn-sm">
                My Ponds
            </a>
            <a th:href="@{/dashboard}"
               class="btn btn-outline-light btn-sm">
                Dashboard
            </a>
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="btn btn-outline-light btn-sm">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 style="color:#0F6E56"
                th:text="${pond.pondName} + ' — Harvest Cycles'">
            </h5>
            <p class="text-muted mb-0"
               th:text="'Location: ' + ${pond.location}">
            </p>
        </div>
        <a th:href="@{/cycles/start/{id}(id=${pond.id})}"
           class="btn"
           style="background-color:#0F6E56; color:white;">
            + Start New Cycle
        </a>
    </div>

    <div th:if="${cycles.empty}" class="alert alert-info">
        No harvest cycles started yet for this pond.
        Click "Start New Cycle" to begin!
    </div>

    <div class="row">
        <div class="col-md-4 mb-3"
             th:each="cycle : ${cycles}">
            <div class="card shadow-sm h-100">
                <div class="card-body">

                    <div class="d-flex justify-content-between mb-2">
                        <h6 class="fw-bold mb-0">
                            Cycle #<span th:text="${cycle.id}"></span>
                        </h6>
                        <span class="badge"
                              th:text="${cycle.status}"
                              th:classappend="${cycle.status == 'ACTIVE'} 
                                  ? 'bg-success' : 'bg-secondary'">
                        </span>
                    </div>

                    <p class="text-muted mb-1">
                        Start Date:
                        <span th:text="${cycle.startDate}"></span>
                    </p>
                    <p class="text-muted mb-1">
                        Seed Count:
                        <span th:text="${cycle.seedCount}"></span>
                    </p>
                    <p class="text-muted mb-1">
                        Seed Cost: ₹
                        <span th:text="${cycle.seedCost}"></span>
                    </p>

                </div>
                <div class="card-footer">
                    <a href="#"
                       class="btn btn-sm w-100"
                       style="background-color:#0F6E56; color:white;">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
