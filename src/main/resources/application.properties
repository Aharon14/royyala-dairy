spring.application.name=royyaladiary

# Database \u2014 uses environment variable on Render, falls back to local
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/royyala_diary}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=${PORT:8080}

# Gemini AI \u2014 uses environment variable on Render
gemini.api.key=${GEMINI_API_KEY:AIzaSyAf-cTzFx5gL0xS6KAHuVIJRuITYnq0-9Y}